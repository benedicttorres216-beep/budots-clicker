<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Verification Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Dashboard Container -->
    <div class="dashboard-card">
        <div class="card-header">
            <div class="dot-group">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
            <div class="system-status">SYSTEM SECURE</div>
        </div>
        
        <div class="card-body">
            <div class="zephh-badge">DEDICATED TO: ZEPHH ❤️</div>

            <p class="instruction-text">Please verify your session by clicking the anchor below.</p>
            
            <div class="score-container">
                <span class="score-label">VERIFIED CLICKS:</span>
                <span id="score" class="score-value">0</span>
            </div>

            <!-- Centralized Button Area with Hidden Dancer Frame -->
            <div class="interaction-zone">
                <!-- Budots Dancer Figure -->
                <div id="budots-dancer" class="dancer-hidden">🕺</div>
                <button id="annoying-btn">VERIFY NOW</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
